<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device" />
</head>


<body>
    <h1>THEME LAB </h1>
    <form id=" PROJECT TWO">
        <lable>First name: </lable>
        <input type="text" name="fname"><br><br>
        <lable>Animal: </lable>
        <input type="text" name="Animal"><br><br>
        <lable>Number: </lable>
        <input type="text" name="Number"><br><br>
        <lable>Adjective: </lable>
        <input type="text" name="Adjective"><br><br>
        <lable>Theme:</lable>

        <select name="theme" id="theme">
            <option value="jungle adventure">jungle adventure</option>
            <option value="forest animals">forest animals</option>
            <option value="wild animal">wild animals</option>
        </select><br><br>
        <button type="button" onclick="submitForm()">Submit</button>
        <button type="reset" value="Reset">Reset</button>

        <br><br>
        <div id="story"></div>
        <script>
            function submitForm() {
                let fname = document.getElementsByName("fname")[0].value;
                let animal = document.getElementsByName("Animal")[0].value;
                let number = document.getElementsByName("Number")[0].value;
                let adjective = document.getElementsByName("Adjective")[0].value;
                let theme = document.getElementById("theme").value;
                if (fname === "" || animal === "" || number === "" || adjective === "") {
                    alert("Please fill all the fields!");
                    return;
                }
                var story = document.getElementById("story");

                const storyText =
                    `Once upon a time, ${fname} discovered a mysterious ${theme} adventure. ` +
                    `While exploring, ${fname} encountered ${number} ${animal}${number > 1 ? "s" : ""}. ` +
                    `Although feeling very ${adjective}, ${fname} decided to keep going. ` +
                    `In the end, the adventure became an unforgettable story with a happy ending.`;

                story.innerHTML = storyText;

            }
        </script>
    </form>
</body>

</html>
